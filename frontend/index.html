<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linguist - AI Translator</title>
    <style>
      body {
        margin: 0;
        background-color: #020617; /* Matches tailwind dark bg */
      }
      :root:not(.dark) body {
        background-color: #020617;
      }
    </style>
    <script>
      // Apply dark mode immediately before React renders — prevents white flash
      document.documentElement.classList.add('dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
